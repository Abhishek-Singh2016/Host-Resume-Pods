apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  #annotations:
    # Optional: If your app doesn't expect the /api prefix, use a rewrite
  #  nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: abhi-ckad.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: python-service
            port:
              number: 80
      - path: /resume
        pathType: Prefix
        backend:
          service:
            name: resume-service
            port:
              number: 80